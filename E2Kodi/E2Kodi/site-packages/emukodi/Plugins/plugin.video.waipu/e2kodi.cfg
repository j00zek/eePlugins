{
    "waipu.tv": {
        "enabled": true,
        "icon": "site-packages/emukodi/Plugins/plugin.video.waipu/logo.png",
        "cfgDir": "waipu",
        "cfgFiles": ["username", "password", "provider=waipu.tv"],
		"cfgValues": ["username", "password", 
					  "provider|Dostawca|ConfigSelection(default = 'waipu.tv', choices = [('waipu.tv', 'waipu.tv'), ('o2 TV', 'o2 TV')])"
					 ],
        "addonScript": "plugin.video.waipu/addon.py",
        "login": ["e2kodi.py '1' '?mode=login' 'resume:false'"],
        "userbouquetOFF": ["e2kodi.py '1' '?mode=listM3U' 'resume:false'"],
		"logout": ["e2kodi.py '1' '?mode=logout' 'resume:false'"]
    }
}
